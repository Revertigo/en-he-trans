name: iOS Build

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build DriveTranslate for iOS Simulator
        run: >
          xcodebuild
          -project DriveTranslate.xcodeproj
          -scheme DriveTranslate
          -configuration Debug
          -sdk iphonesimulator
          -destination "generic/platform=iOS Simulator"
          CODE_SIGNING_ALLOWED=NO
          build
